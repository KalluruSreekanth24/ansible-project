- name: setting up catalogue
  hosts: catalogue
  become: yes
  tasks: 
    - name: disable default nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable nodejs 20
      ansible.builtin.command: dnf module enable nodejs:20 -y
    - name: installnig nodejs
      ansible.builtin.package:
        name: nodejs
        state: present
    - name: create user
      ansible.builtin.user:
        name: roboshop
        comment: RoboShop System user
        system: true
        shell: /sbin/nologin
        home: /app
    - name: remove app dir
      ansible.builtin.file:
        path: /app
        state: absent
    - name: create dir
      ansible.builtin.file:
        state: directory
        path: /app
    - name: del the tmp/catalogue
      ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent
    - name: download the code to tmp
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip
    - name: unzip
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes
    - name: install dependencies
      community.general.npm:
        path: /app
    - name: service created
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service
    - name: copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
    - name: install mongodb client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present

    - name: connnect to mongodb catalogue
      ansible.builtin.command: mongosh mongodb.rajeswari.shop --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output
    - name: load products into mongodb
      ansible.builtin.shell: mongosh --host mongodb.rajeswari.shop </app/db/master-data.js
      when: catalogue_output.stdout | int < 0
    - name: service start
      ansible.builtin.systemd_service:
        name: catalogue
        enabled: true
        state: started
        daemon_reload: true
