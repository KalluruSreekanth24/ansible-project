- name: setting up payment 
  hosts: payment
  become: yes
  tasks:
    - name: installing the python
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      loop:
      - python
      - gcc
      - python3-devel
    - name: user add
      ansible.builtin.user:
        name: roboshop
        comment: roboshop system user
        system: true
        shell: /sbin/nologin
        home: /app
    - name: remove dir
      ansible.builtin.file:
        path: /app 
        state: absent
    - name: create dir
      ansible.builtin.file:
        state: directory
        path: /app
    - name: remove the content in tmp
      ansible.builtin.file:
        path: /tmp/payment.zip
        state: absent
    - name: downloading the content
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
        dest: /tmp/payment.zip
    - name: unzip the file
      ansible.builtin.unarchive:
        src: /tmp/payment.zip
        dest: /app
        remote_src: yes
    - name: install dependencies
      ansible.builtin.pip:
        requirements: requirements.txt
        executable: pip3.9
      args:
        chdir: /app
    - name: copying the service
      ansible.builtin.copy:
        src: payment.service
        dest: /etc/systemd/system/payment.service
    - name: deamon reload
      ansible.builtin.systemd_service:
        name: payment
        enabled: yes
        state: started
        daemon_reload: true
