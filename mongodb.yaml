- name: mongodb
  hosts: mongodb
  become: yes
  tasks:
    - name: copy the repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
    - name: install mongodb
      ansible.builtin.package:
        name: mongodb-org
        state: present
    - name: replace
      ansible.builtin.replace:
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0' 
    - name: start and enable
      ansible.builtin.service:
        name: mongodb
        state: started
        enable: yes